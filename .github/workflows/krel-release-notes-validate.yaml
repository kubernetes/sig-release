name: Yaml Lint Release Notes Pull Request
on:
  pull_request:
    paths:
      - releases/**/release-notes/**.yaml
  # Allow manual triggering
  workflow_dispatch: {}

concurrency:
  group: ${{ github.ref }}-${{ github.workflow }}
  cancel-in-progress: true
jobs:
  krel_release_notes_validate_action:
    name: Validate release notes with krel
    runs-on: ubuntu-latest
    if: ${{ !github.event.pull_request.draft }}
    steps:
      - name: Cancel Previous Actions
        uses: styfle/cancel-workflow-action@85880fa0301c86cca9da44039ee3bb12d3bedbfa # v0.12.1
        with:
            access_token: ${{ github.token }}
      - name: Check out code
        uses: actions/checkout@692973e3d937129bcbf40652eb9f2f61becf3332 # v4.1.7
        with:
          # we need to fetch the full history in order to check changes across all commits on the branch
          fetch-depth: '0'
      - uses: actions/setup-go@41dfa10bad2bb2ae585af6ee5bb4d7d973ad74ed # v5.1.0
        with:
            go-version: '1.23'
            check-latest: true
      - id: install-krel
        shell: bash
        run: |
            #!/usr/bin/env bash
            set -euo pipefail
            echo "Installing krel..."
            if ! go install k8s.io/release/cmd/krel@latest; then
              echo "::error::Failed to install krel"
              exit 1
            fi
            echo "Verifying krel installation..."
            if ! command -v krel &> /dev/null; then
              echo "::error::krel not found in PATH after installation"
              exit 1
            fi
            echo "Testing krel..."
            if ! krel --help &> /dev/null; then
              echo "::error::krel --help failed, installation may be corrupted"
              exit 1
            fi
            echo "krel installed successfully"
            KREL_PATH=$(which krel)
            echo "krel-path=$KREL_PATH" >> "$GITHUB_OUTPUT"
            echo "Krel path: $KREL_PATH"
      - name: Get the latest commit from the base branch
        id: base_branch_commit
        run: |
          echo "commit=$(git rev-parse origin/master)" >> $GITHUB_OUTPUT
      - name: Get all changed release files
        id: changed-files
        uses: tj-actions/changed-files@cc733854b1f224978ef800d29e4709d5ee2883e4 # v44.5.5
        with:
          base_sha: ${{ steps.base_branch_commit.outputs.commit }}
          files: releases/**/*.yaml
      - name: Run if releases YAML changes exist and validate the YAML
        id: validate_releases_yaml
        env:
          KREL_PATH: ${{ steps.install-krel.outputs.krel-path }}
        run: |
          # Get a list of changed YAML files based on git diff
          CHANGED_FILES=$(git diff --name-only ${{ github.event.pull_request.base.sha }} ${{ github.sha }} -- releases/ | grep -E '\.ya?ml$')

          if [ -n "$CHANGED_FILES" ]; then
            echo "validating base sha ${{ github.event.pull_request.base.sha }}"

            # Initialize an empty string to collect invalid files
            INVALID_FILES=""

            # Loop through each changed YAML file and validate it
            for file in $CHANGED_FILES; do
              echo "Validating YAML file: $file"
              OUTPUT=$(${KREL_PATH} release-notes validate --path-to-release-notes "$file")

              # If validation fails for any file, collect the invalid files
              if [[ "$OUTPUT" == *"YAML Validation Failed"* ]]; then
                echo "Invalid YAML file: $file"
                INVALID_FILES="$INVALID_FILES$file\n"
              fi
            done

            # If there are any invalid files, set the output variable and fail the job
            if [ -n "$INVALID_FILES" ]; then
              echo "invalid_files<<EOF" >> $GITHUB_ENV
              echo -e "$INVALID_FILES" >> $GITHUB_ENV
              echo "EOF" >> $GITHUB_ENV
              exit 1
            else
              echo "All YAML files are valid."
            fi
          else
            echo "No YAML files changed under /releases/*"
          fi
      - name: Comment on PR if invalid yaml detected
        if: failure()
        uses: actions/github-script@60a0d83039c74a4aee543508d2ffcb1c3799cdea # v7.0.1
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}  # Ensure this is provided for authentication
          script: |
            const invalidFiles = process.env.invalid_files.trim();
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.issue.number,
              body: `The following YAML files are invalid:\n\n${invalidFiles}`
            })
        env:
          invalid_files: ${{ env.invalid_files }}
